; PlatformIO configuration for ESP32-S3R8 Voice Terminal
;
; Board: ESP32-S3-DevKitC-1 (or equivalent with 8MB PSRAM)
; Framework: Arduino
;
; Flash with: pio run -t upload

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Enable PSRAM (8MB OPI)
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; I2S pin definitions (adjust to your wiring)
    -DPIN_I2S_MIC_SCK=42
    -DPIN_I2S_MIC_WS=41
    -DPIN_I2S_MIC_SD=2
    -DPIN_I2S_SPK_BCK=17
    -DPIN_I2S_SPK_WS=18
    -DPIN_I2S_SPK_DATA=8
    -DPIN_PTT_BUTTON=0
    -DPIN_STATUS_LED=48

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    WiFi
    HTTPClient
