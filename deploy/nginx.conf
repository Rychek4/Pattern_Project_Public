# Pattern Project - nginx reverse proxy configuration
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/pattern
#   2. ln -s /etc/nginx/sites-available/pattern /etc/nginx/sites-enabled/
#   3. Replace YOUR_DOMAIN with your actual domain
#   4. Run: sudo certbot --nginx -d YOUR_DOMAIN
#   5. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect HTTP to HTTPS (certbot will add this automatically)
    return 301 https://$host$request_uri;
}

# Rate limiting zone (must be in http context - add to /etc/nginx/nginx.conf
# or include this file from within the http block)
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # SSL certificates (managed by certbot)
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    location /auth/login {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout (keep alive for long sessions)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Blog write form + API — proxy to FastAPI (auth-protected)
    location /blog/write {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/blog {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Blog — static files served directly by nginx (no proxy)
    location /blog {
        alias /var/www/blog;
        index index.html;
        try_files $uri $uri/ =404;

        # Cache static blog assets
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # All other requests
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
